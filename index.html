<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>What is Vision? — Jair's AI assistant</title>
    <meta
      name="description"
      content="A plain-English infographic explaining Vision, Jair's private AI assistant, and everything it's connected to."
    />
    <meta name="theme-color" content="#5b57e6" />
    <meta name="color-scheme" content="light dark" />

    <meta property="og:title" content="What is Vision?" />
    <meta
      property="og:description"
      content="Vision is Jair's private AI assistant. Here's what it is and what it can do — in plain English."
    />
    <meta property="og:type" content="website" />

    <!-- Set the theme before paint to avoid a flash of the wrong colors. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var prefersDark = window.matchMedia(
            "(prefers-color-scheme: dark)"
          ).matches;
          if (stored === "dark" || (!stored && prefersDark)) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
